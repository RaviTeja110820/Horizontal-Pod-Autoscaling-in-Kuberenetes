apiVersion: apps/v1
kind: Deployment

metadata:
  name: hpa-nginx-deployment

spec:
  replicas: 2

  selector:
    matchLabels:
      app: hpa-nginx

  template:
    metadata:
      labels:
        app: hpa-nginx

    spec:
      containers:
      - name: hpa-nginx-container
        image: ravteja/hpa-nginx:v1

        ports:
        - containerPort: 80

        resources:
          requests:
            memory: "32Mi"
            cpu: "50m"

          limits:
            memory: "128Mi"
            cpu: "200m"